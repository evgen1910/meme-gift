<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Подарок | 40 мемов</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #000000;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            color: white;
            line-height: 1.5;
        }

        /* Общий контейнер */
        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
        }

        /* Стили для текстовых блоков */
        .text-block {
            min-height: 80vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 40px 20px;
        }

        .title-text {
            font-size: clamp(1.8rem, 8vw, 3rem);
            font-weight: 700;
            line-height: 1.3;
            margin-bottom: 30px;
        }

        .final-text {
            font-size: clamp(1.6rem, 7vw, 2.5rem);
            font-weight: 500;
            line-height: 1.4;
        }

        .emoji-big {
            font-size: 4rem;
            margin-bottom: 20px;
        }

        .sub-prompt {
            margin-top: 30px;
            font-size: 0.9rem;
            color: #888;
        }

        /* Стили для мемов */
        .meme-block {
            margin: 30px 0;
            background: #0a0a0a;
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }

        .meme-image {
            width: 100%;
            height: auto;
            display: block;
        }

        .meme-counter {
            padding: 12px;
            text-align: center;
            background: #111;
            color: #aaa;
            font-size: 0.85rem;
            border-top: 1px solid #222;
        }

        /* Разделитель */
        .separator {
            height: 2px;
            background: linear-gradient(90deg, transparent, #333, transparent);
            margin: 20px 0;
        }

        /* Адаптация */
        @media (max-width: 600px) {
            .container {
                padding: 15px;
            }
            .text-block {
                min-height: 70vh;
                padding: 30px 15px;
            }
            .meme-block {
                margin: 20px 0;
                border-radius: 16px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- ТИТУЛЬНЫЙ БЛОК -->
        <div class="text-block">
            <div class="title-text">
                ⚡ ТВОЙ ПОДАРОК на 1 апреля ⚡<br><br>
                Тут 40 религиозных мемов<br>
                (Пасха же скоро)<br><br>
                Я надеюсь, ты любишь меня достаточно,<br>
                чтобы не предать анафеме
            </div>
            <div class="sub-prompt">
                👇 просто листай вниз 👇
            </div>
        </div>

        <div class="separator"></div>

        <!-- СЮДА БУДУТ ДОБАВЛЯТЬСЯ МЕМЫ (через JavaScript) -->
        <div id="memesContainer"></div>

        <div class="separator"></div>

        <!-- ФИНАЛЬНЫЙ БЛОК -->
        <div class="text-block">
            <div class="emoji-big">🎁✨</div>
            <div class="final-text">
                Спасибо, что дошли до конца!<br><br>
                Ваш котел разогревается рядом с моим ❤️
            </div>
            <div class="sub-prompt">
                🔄 сделано специально для тебя
            </div>
        </div>
    </div>

    <script>
        // НАСТРОЙКИ
        const TOTAL_MEMES = 40;
        const IMAGE_EXTENSION = 'jpg';  // если картинки .png, поменяйте здесь
        const IMAGE_FOLDER = 'images';
        
        // Находим контейнер для мемов
        const memesContainer = document.getElementById('memesContainer');
        
        // Функция создания одного мема
        function createMemeBlock(number) {
            const imagePath = `${IMAGE_FOLDER}/${number}.${IMAGE_EXTENSION}`;
            
            const block = document.createElement('div');
            block.className = 'meme-block';
            block.innerHTML = `
                <img class="meme-image" 
                     src="${imagePath}" 
                     alt="мем ${number}"
                     loading="lazy"
                     onerror="this.src='https://placehold.co/600x400?text=Мем+${number}+не+найден&bg=222&fg=white'; this.onerror=null;">
                <div class="meme-counter">
                    📸 ${number} / ${TOTAL_MEMES}
                </div>
            `;
            return block;
        }
        
        // Добавляем все мемы на страницу
        for (let i = 1; i <= TOTAL_MEMES; i++) {
            const memeBlock = createMemeBlock(i);
            memesContainer.appendChild(memeBlock);
        }
    </script>
</body>
</html>
